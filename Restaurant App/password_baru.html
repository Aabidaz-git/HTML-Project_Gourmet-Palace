<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gourmet Palace - Buat Password Baru</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #8b5a2b;
            --secondary: #1a1a1a;
            --accent: #c19a6b;
            --light: #f8f5f2;
            --dark: #333333;
            --success: #4caf50;
            --text: #333333;
            --text-light: #777777;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Playfair Display', serif;
        }
        
        body {
            background-color: var(--light);
            color: var(--text);
            line-height: 1.6;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 20px;
        }
        
        /* Luxury Header */
        header {
            background: rgba(26, 26, 26, 0.9);
            color: white;
            padding: 1rem 0;
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(193, 154, 107, 0.3);
            transition: all 0.3s ease;
        }
        
        .header-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .logo {
            font-size: 1.8rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            font-family: 'Playfair Display', serif;
        }
        
        .logo i {
            color: var(--accent);
            margin-right: 10px;
        }
        
        /* New Password Section */
        .newpass-section {
            padding: 10rem 0 6rem;
            min-height: 100vh;
            display: flex;
            align-items: center;
        }
        
        .newpass-container {
            max-width: 500px;
            margin: 0 auto;
            width: 100%;
            background: white;
            padding: 3rem;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            text-align: center;
        }
        
        .newpass-title {
            margin-bottom: 2rem;
        }
        
        .newpass-title h2 {
            font-size: 2.2rem;
            color: var(--secondary);
            margin-bottom: 1rem;
            position: relative;
            padding-bottom: 15px;
        }
        
        .newpass-title h2:after {
            content: '';
            position: absolute;
            width: 60px;
            height: 3px;
            background: var(--accent);
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
        }
        
        .newpass-title p {
            color: var(--text-light);
            font-size: 1rem;
        }
        
        .form-group {
            margin-bottom: 1.5rem;
            text-align: left;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--secondary);
            font-weight: 500;
        }
        
        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #ddd;
            background: #f9f9f9;
            font-size: 1rem;
            transition: all 0.3s ease;
        }
        
        .form-group input:focus {
            border-color: var(--accent);
            background: white;
            outline: none;
        }
        
        .password-strength {
            margin-top: 0.5rem;
            font-size: 0.8rem;
            color: var(--text-light);
        }
        
        .strength-meter {
            height: 5px;
            background: #eee;
            margin-top: 5px;
            border-radius: 3px;
            overflow: hidden;
        }
        
        .strength-meter-fill {
            height: 100%;
            width: 0%;
            background: #ccc;
            transition: all 0.3s ease;
        }
        
        .btn {
            display: inline-block;
            padding: 15px 40px;
            background: var(--accent);
            color: var(--secondary);
            border: none;
            border-radius: 0;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            letter-spacing: 1px;
            text-transform: uppercase;
            border: 1px solid var(--accent);
            width: 100%;
        }
        
        .btn:hover {
            background: transparent;
            color: var(--accent);
        }
        
        /* Footer */
        footer {
            background: var(--secondary);
            color: white;
            padding: 2rem 0;
            text-align: center;
        }
        
        .footer-bottom {
            color: #bbb;
            font-size: 0.9rem;
        }
        
        @media (max-width: 768px) {
            .newpass-section {
                padding: 8rem 0 4rem;
            }
            
            .newpass-container {
                padding: 2rem;
            }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header id="header">
        <div class="container header-container">
            <div class="logo">
                <i class="fas fa-utensils"></i>
                <span>Gourmet Palace</span>
            </div>
        </div>
    </header>

    <!-- New Password Section -->
    <section class="newpass-section">
        <div class="container">
            <div class="newpass-container">
                <div class="newpass-title">
                    <h2>Buat Password Baru</h2>
                    <p>Buat password baru untuk akun Anda</p>
                </div>
                <form id="newPassForm">
                    <input type="hidden" id="email">
                    <input type="hidden" id="code">
                    
                    <div class="form-group">
                        <label for="password">Password Baru</label>
                        <input type="password" id="password" required placeholder="Minimal 8 karakter">
                        <div class="password-strength">
                            <span id="strength-text">Kekuatan password: lemah</span>
                            <div class="strength-meter">
                                <div class="strength-meter-fill" id="strength-meter"></div>
                            </div>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="confirmPassword">Konfirmasi Password Baru</label>
                        <input type="password" id="confirmPassword" required placeholder="Ketik ulang password baru">
                    </div>
                    <button type="submit" class="btn">Simpan Password Baru</button>
                </form>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer>
        <div class="container">
            <div class="footer-bottom">
                <p>&copy; 2023 Gourmet Palace. All Rights Reserved.</p>
            </div>
        </div>
    </footer>

    <script>
        // Get email and code from URL parameters
        const urlParams = new URLSearchParams(window.location.search);
        const email = urlParams.get('email');
        const code = urlParams.get('code');
        
        if (email) {
            document.getElementById('email').value = email;
        }
        
        if (code) {
            document.getElementById('code').value = code;
        }
        
        // Password strength indicator
        const passwordInput = document.getElementById('password');
        const strengthText = document.getElementById('strength-text');
        const strengthMeter = document.getElementById('strength-meter');
        
        passwordInput.addEventListener('input', function() {
            const password = this.value;
            let strength = 0;
            
            // Check length
            if (password.length >= 8) strength += 1;
            if (password.length >= 12) strength += 1;
            
            // Check for mixed case
            if (/[a-z]/.test(password) && /[A-Z]/.test(password)) strength += 1;
            
            // Check for numbers
            if (/\d/.test(password)) strength += 1;
            
            // Check for special chars
            if (/[^a-zA-Z0-9]/.test(password)) strength += 1;
            
            // Update UI
            let strengthLevel = '';
            let meterColor = '';
            let meterWidth = '0%';
            
            if (strength <= 1) {
                strengthLevel = 'Lemah';
                meterColor = '#ff5252';
                meterWidth = '25%';
            } else if (strength <= 3) {
                strengthLevel = 'Sedang';
                meterColor = '#ffb74d';
                meterWidth = '50%';
            } else if (strength <= 4) {
                strengthLevel = 'Kuat';
                meterColor = '#4caf50';
                meterWidth = '75%';
            } else {
                strengthLevel = 'Sangat Kuat';
                meterColor = '#2e7d32';
                meterWidth = '100%';
            }
            
            strengthText.textContent = `Kekuatan password: ${strengthLevel}`;
            strengthMeter.style.width = meterWidth;
            strengthMeter.style.backgroundColor = meterColor;
        });
        
        document.getElementById('newPassForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            
            // Simple validation
            if (password !== confirmPassword) {
                alert('Password dan konfirmasi password tidak cocok!');
                return;
            }
            
            if (password.length < 8) {
                alert('Password harus minimal 8 karakter!');
                return;
            }
            
            console.log('New password set for:', email);
            console.log('Verification code:', code);
            console.log('New password:', password);
            
            // In a real app, you would send this to your server to update the password
            
            // For demo purposes, redirect to login with success message
            alert('Password Anda berhasil diubah! Silakan login dengan password baru Anda.');
            window.location.href = 'login.html?passwordChanged=true';
        });
    </script>
</body>
</html>
