<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gourmet Palace - Lupa Password</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #8b5a2b;
            --secondary: #1a1a1a;
            --accent: #c19a6b;
            --light: #f8f5f2;
            --dark: #333333;
            --success: #4caf50;
            --text: #333333;
            --text-light: #777777;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Playfair Display', serif;
        }
        
        body {
            background-color: var(--light);
            color: var(--text);
            line-height: 1.6;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 20px;
        }
        
        /* Luxury Header */
        header {
            background: rgba(26, 26, 26, 0.9);
            color: white;
            padding: 1rem 0;
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(193, 154, 107, 0.3);
            transition: all 0.3s ease;
        }
        
        .header-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .logo {
            font-size: 1.8rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            font-family: 'Playfair Display', serif;
        }
        
        .logo i {
            color: var(--accent);
            margin-right: 10px;
        }
        
        /* Forgot Password Section */
        .forgot-section {
            padding: 10rem 0 6rem;
            min-height: 100vh;
            display: flex;
            align-items: center;
        }
        
        .forgot-container {
            max-width: 500px;
            margin: 0 auto;
            width: 100%;
            background: white;
            padding: 3rem;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            text-align: center;
        }
        
        .forgot-title {
            margin-bottom: 2rem;
        }
        
        .forgot-title h2 {
            font-size: 2.2rem;
            color: var(--secondary);
            margin-bottom: 1rem;
            position: relative;
            padding-bottom: 15px;
        }
        
        .forgot-title h2:after {
            content: '';
            position: absolute;
            width: 60px;
            height: 3px;
            background: var(--accent);
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
        }
        
        .forgot-title p {
            color: var(--text-light);
            font-size: 1rem;
        }
        
        .form-group {
            margin-bottom: 1.5rem;
            text-align: left;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--secondary);
            font-weight: 500;
        }
        
        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #ddd;
            background: #f9f9f9;
            font-size: 1rem;
            transition: all 0.3s ease;
        }
        
        .form-group input:focus {
            border-color: var(--accent);
            background: white;
            outline: none;
        }
        
        .btn {
            display: inline-block;
            padding: 15px 40px;
            background: var(--accent);
            color: var(--secondary);
            border: none;
            border-radius: 0;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            letter-spacing: 1px;
            text-transform: uppercase;
            border: 1px solid var(--accent);
            width: 100%;
        }
        
        .btn:hover {
            background: transparent;
            color: var(--accent);
        }
        
        .back-to-login {
            margin-top: 2rem;
            font-size: 0.9rem;
            color: var(--text-light);
        }
        
        .back-to-login a {
            color: var(--accent);
            text-decoration: none;
            transition: all 0.3s ease;
        }
        
        .back-to-login a:hover {
            text-decoration: underline;
        }
        
        /* Footer */
        footer {
            background: var(--secondary);
            color: white;
            padding: 2rem 0;
            text-align: center;
        }
        
        .footer-bottom {
            color: #bbb;
            font-size: 0.9rem;
        }
        
        @media (max-width: 768px) {
            .forgot-section {
                padding: 8rem 0 4rem;
            }
            
            .forgot-container {
                padding: 2rem;
            }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header id="header">
        <div class="container header-container">
            <div class="logo">
                <i class="fas fa-utensils"></i>
                <span>Gourmet Palace</span>
            </div>
        </div>
    </header>

    <!-- Forgot Password Section -->
    <section class="forgot-section">
        <div class="container">
            <div class="forgot-container">
                <div class="forgot-title">
                    <h2>Lupa Password</h2>
                    <p>Masukkan email Anda untuk menerima link reset password</p>
                </div>
                <form id="forgotForm">
                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" required placeholder="alamat@email.com">
                    </div>
                    <button type="submit" class="btn" href="verifikasi.html">Kirim Link Reset</button>
                </form>
                <div class="back-to-login">
                    <p>Ingat password Anda? <a href="login.html">Kembali ke login</a></p>
                </div>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer>
        <div class="container">
            <div class="footer-bottom">
                <p>&copy; 2023 Gourmet Palace. All Rights Reserved.</p>
            </div>
        </div>
    </footer>

    <script>
        document.getElementById('forgotForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const email = document.getElementById('email').value;
            
            console.log('Reset password requested for:', email);
            // In a real app, you would send this to your server to process
            
            // For demo purposes, redirect to verification page
            window.location.href = 'reset-verification.html?email=' + encodeURIComponent(email);
        });
    </script>
</body>
</html>
