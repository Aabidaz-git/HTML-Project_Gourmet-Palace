<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gourmet Palace - Verifikasi Reset Password</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #8b5a2b;
            --secondary: #1a1a1a;
            --accent: #c19a6b;
            --light: #f8f5f2;
            --dark: #333333;
            --success: #4caf50;
            --text: #333333;
            --text-light: #777777;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Playfair Display', serif;
        }
        
        body {
            background-color: var(--light);
            color: var(--text);
            line-height: 1.6;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 20px;
        }
        
        /* Luxury Header */
        header {
            background: rgba(26, 26, 26, 0.9);
            color: white;
            padding: 1rem 0;
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(193, 154, 107, 0.3);
            transition: all 0.3s ease;
        }
        
        .header-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .logo {
            font-size: 1.8rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            font-family: 'Playfair Display', serif;
        }
        
        .logo i {
            color: var(--accent);
            margin-right: 10px;
        }
        
        /* Verification Section */
        .verification-section {
            padding: 10rem 0 6rem;
            min-height: 100vh;
            display: flex;
            align-items: center;
        }
        
        .verification-container {
            max-width: 500px;
            margin: 0 auto;
            width: 100%;
            background: white;
            padding: 3rem;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            text-align: center;
        }
        
        .verification-title {
            margin-bottom: 2rem;
        }
        
        .verification-title h2 {
            font-size: 2.2rem;
            color: var(--secondary);
            margin-bottom: 1rem;
            position: relative;
            padding-bottom: 15px;
        }
        
        .verification-title h2:after {
            content: '';
            position: absolute;
            width: 60px;
            height: 3px;
            background: var(--accent);
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
        }
        
        .verification-title p {
            color: var(--text-light);
            font-size: 1rem;
        }
        
        .email-sent {
            background: #f8f5f2;
            padding: 1rem;
            margin-bottom: 2rem;
            text-align: center;
            border-left: 3px solid var(--accent);
        }
        
        .email-sent strong {
            color: var(--secondary);
        }
        
        .code-inputs {
            display: flex;
            justify-content: space-between;
            margin-bottom: 2rem;
        }
        
        .code-inputs input {
            width: 50px;
            height: 60px;
            text-align: center;
            font-size: 1.5rem;
            border: 1px solid #ddd;
            background: #f9f9f9;
            transition: all 0.3s ease;
        }
        
        .code-inputs input:focus {
            border-color: var(--accent);
            background: white;
            outline: none;
        }
        
        .btn {
            display: inline-block;
            padding: 15px 40px;
            background: var(--accent);
            color: var(--secondary);
            border: none;
            border-radius: 0;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            letter-spacing: 1px;
            text-transform: uppercase;
            border: 1px solid var(--accent);
            width: 100%;
        }
        
        .btn:hover {
            background: transparent;
            color: var(--accent);
        }
        
        .resend-code {
            margin-top: 1.5rem;
            font-size: 0.9rem;
            color: var(--text-light);
        }
        
        .resend-code a {
            color: var(--accent);
            text-decoration: none;
            transition: all 0.3s ease;
        }
        
        .resend-code a:hover {
            text-decoration: underline;
        }
        
        /* Footer */
        footer {
            background: var(--secondary);
            color: white;
            padding: 2rem 0;
            text-align: center;
        }
        
        .footer-bottom {
            color: #bbb;
            font-size: 0.9rem;
        }
        
        @media (max-width: 768px) {
            .verification-section {
                padding: 8rem 0 4rem;
            }
            
            .verification-container {
                padding: 2rem;
            }
            
            .code-inputs input {
                width: 40px;
                height: 50px;
                font-size: 1.2rem;
            }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header id="header">
        <div class="container header-container">
            <div class="logo">
                <i class="fas fa-utensils"></i>
                <span>Gourmet Palace</span>
            </div>
        </div>
    </header>

    <!-- Verification Section -->
    <section class="verification-section">
        <div class="container">
            <div class="verification-container">
                <div class="verification-title">
                    <h2>Verifikasi Kode</h2>
                    <p>Masukkan 6-digit kode yang dikirim ke email Anda</p>
                </div>
                
                <div class="email-sent">
                    <p>Kode verifikasi telah dikirim ke: <strong id="userEmail">user@example.com</strong></p>
                </div>
                
                <form id="verificationForm">
                    <div class="code-inputs">
                        <input type="text" maxlength="1" pattern="[0-9]" required>
                        <input type="text" maxlength="1" pattern="[0-9]" required>
                        <input type="text" maxlength="1" pattern="[0-9]" required>
                        <input type="text" maxlength="1" pattern="[0-9]" required>
                        <input type="text" maxlength="1" pattern="[0-9]" required>
                        <input type="text" maxlength="1" pattern="[0-9]" required>
                    </div>
                    
                    <button type="submit" class="btn">Verifikasi Kode</button>
                </form>
                
                <div class="resend-code">
                    <p>Tidak menerima kode? <a href="#">Kirim ulang kode</a></p>
                </div>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer>
        <div class="container">
            <div class="footer-bottom">
                <p>&copy; 2023 Gourmet Palace. All Rights Reserved.</p>
            </div>
        </div>
    </footer>

    <script>
        // Get email from URL parameter
        const urlParams = new URLSearchParams(window.location.search);
        const email = urlParams.get('email');
        
        if (email) {
            document.getElementById('userEmail').textContent = email;
        }
        
        // Auto focus and move between inputs
        const inputs = document.querySelectorAll('.code-inputs input');
        
        inputs.forEach((input, index) => {
            input.addEventListener('input', (e) => {
                if (e.target.value.length === 1) {
                    if (index < inputs.length - 1) {
                        inputs[index + 1].focus();
                    }
                }
            });
            
            input.addEventListener('keydown', (e) => {
                if (e.key === 'Backspace' && e.target.value === '') {
                    if (index > 0) {
                        inputs[index - 1].focus();
                    }
                }
            });
        });
        
        document.getElementById('verificationForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            // Get verification code
            let code = '';
            inputs.forEach(input => {
                code += input.value;
            });
            
            console.log('Verification code:', code);
            // In a real app, you would verify this code with your server
            
            // For demo purposes, redirect to new password page
            window.location.href = 'new-password.html?email=' + encodeURIComponent(email) + '&code=' + code;
        });
    </script>
</body>
</html>
